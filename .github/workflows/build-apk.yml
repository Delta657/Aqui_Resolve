name: Build APK

# Geração do APK do app Android no GitHub Actions.
# - Manual: aba Actions -> "Build APK" -> Run workflow (escolhe se gera release).
# - Automático: ao publicar uma tag começando com "v" (ex.: v1.2.8).
# Os artefatos (.apk) ficam disponíveis para download no final do run.
#
# Segredos necessários (Settings -> Secrets and variables -> Actions):
#   GOOGLE_SERVICES_JSON_BASE64        -> base64 do app/google-services.json real     (obrigatório)
#   UPLOAD_KEYSTORE_JKS_BASE64         -> base64 do keystore/upload-keystore.jks       (só p/ release)
#   UPLOAD_KEYSTORE_CREDENTIALS_BASE64 -> base64 do keystore/upload-keystore.credentials.txt (só p/ release)

on:
  workflow_dispatch:
    inputs:
      build_release:
        description: "Gerar também o APK release assinado (precisa do keystore)"
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_JKS_BASE64 }}
      CREDENTIALS_B64: ${{ secrets.UPLOAD_KEYSTORE_CREDENTIALS_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Restaurar google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GS_B64" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON_BASE64 ausente — necessário para o build."
            exit 1
          fi
          echo "$GS_B64" | base64 -d > app/google-services.json
          echo "google-services.json restaurado ($(wc -c < app/google-services.json) bytes)"

      - name: Restaurar keystore de release
        if: ${{ env.KEYSTORE_B64 != '' && env.CREDENTIALS_B64 != '' }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_B64" | base64 -d > keystore/upload-keystore.jks
          echo "$CREDENTIALS_B64" | base64 -d > keystore/upload-keystore.credentials.txt
          echo "keystore de release restaurado"

      - name: Permissão de execução do gradlew
        run: chmod +x gradlew

      - name: Build APK debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build APK release (assinado)
        if: ${{ env.KEYSTORE_B64 != '' && env.CREDENTIALS_B64 != '' && (github.event_name != 'workflow_dispatch' || inputs.build_release) }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload APK debug
        uses: actions/upload-artifact@v4
        with:
          name: aquiresolve-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK release
        if: ${{ env.KEYSTORE_B64 != '' && env.CREDENTIALS_B64 != '' && (github.event_name != 'workflow_dispatch' || inputs.build_release) }}
        uses: actions/upload-artifact@v4
        with:
          name: aquiresolve-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
